<!DOCTYPE html>
<html lang="it">

<head>
  <meta charset="utf-8" />
  <title>Word Golf — classifica live</title>
  <style>
    :root {
      --bg: #0f172a;
      --card: #1e293b;
      --border: #334155;
      --text: #e2e8f0;
      --muted: #94a3b8;
      --accent: #38bdf8;
      --gold: #fbbf24;
      --silver: #cbd5e1;
      --bronze: #f97316;
    }

    body {
      margin: 0;
      padding: 24px;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
      flex-wrap: wrap;
      gap: 12px;
    }

    h1 {
      margin: 0;
      font-size: 36px;
      letter-spacing: -0.02em;
    }

    h1 .emoji {
      margin-right: 10px;
    }

    .status {
      color: var(--muted);
      font-size: 14px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #10b981;
      box-shadow: 0 0 8px #10b981;
      animation: pulse 1.5s infinite;
    }

    .dot.error {
      background: #ef4444;
      box-shadow: 0 0 8px #ef4444;
      animation: none;
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 1;
      }

      50% {
        opacity: 0.4;
      }
    }

    #setup {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 24px;
      margin-bottom: 24px;
    }

    #setup label {
      display: block;
      margin-bottom: 8px;
      font-size: 14px;
      color: var(--muted);
    }

    #setup input {
      width: 100%;
      padding: 10px 14px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: inherit;
      font-size: 14px;
      box-sizing: border-box;
    }

    #setup button {
      margin-top: 12px;
      padding: 10px 20px;
      background: var(--accent);
      color: var(--bg);
      border: none;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      font-size: 14px;
    }

    .rounds {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(380px, 1fr));
      gap: 20px;
    }

    .round-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
    }

    .round-title {
      font-size: 20px;
      margin: 0 0 16px 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .round-title .label {
      font-weight: 600;
    }

    .round-title .arrow {
      color: var(--muted);
      margin: 0 8px;
    }

    .round-title .target {
      color: var(--accent);
    }

    .round-title .count {
      font-size: 12px;
      color: var(--muted);
      font-weight: normal;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    td {
      padding: 8px 0;
      border-bottom: 1px solid var(--border);
      font-size: 16px;
    }

    td:last-child {
      text-align: right;
      font-variant-numeric: tabular-nums;
      color: var(--muted);
    }

    tr:last-child td {
      border-bottom: none;
    }

    .rank {
      width: 40px;
      text-align: center;
      font-size: 20px;
    }

    .rank-1 {
      color: var(--gold);
    }

    .rank-2 {
      color: var(--silver);
    }

    .rank-3 {
      color: var(--bronze);
    }

    .empty {
      color: var(--muted);
      font-style: italic;
      text-align: center;
      padding: 20px 0;
    }

    .flash {
      animation: flash 1.2s ease-out;
    }

    @keyframes flash {
      0% {
        background: #38bdf833;
      }

      100% {
        background: transparent;
      }
    }
  </style>
</head>

<body>

  <header>
    <h1><span class="emoji">🏆</span>Word Golf — classifica live</h1>
    <div class="status">
      <div class="dot" id="dot"></div>
      <span id="statusText">connesso</span>
    </div>
  </header>

  <div id="setup">
    <label for="urlInput">URL Apps Script (Web App):</label>
    <input id="urlInput" placeholder="https://script.google.com/macros/s/.../exec" />
    <button onclick="salvaUrl()">Connetti</button>
  </div>

  <div id="rounds" class="rounds"></div>

  <script>
    const STORAGE_KEY = "wordgolf_dashboard_url";
    const POLL_MS = 3000;

    let appUrl = localStorage.getItem(STORAGE_KEY) || "";
    let lastSig = "";

    function salvaUrl() {
      const v = document.getElementById("urlInput").value.trim();
      if (!v) return;
      appUrl = v;
      localStorage.setItem(STORAGE_KEY, v);
      document.getElementById("setup").style.display = "none";
      poll();
    }

    function setStatus(ok, msg) {
      document.getElementById("dot").classList.toggle("error", !ok);
      document.getElementById("statusText").textContent = msg;
    }

    async function poll() {
      if (!appUrl) return;
      try {
        // Apps Script richiede no-cors? In realta' doGet con JSON viene servito
        // con i giusti headers; usiamo fetch standard.
        const res = await fetch(appUrl, { cache: "no-store" });
        const data = await res.json();
        if (!data.ok) throw new Error(data.error || "?");
        render(data.records || []);
        setStatus(true, `${data.records.length} partite • aggiornato ${new Date().toLocaleTimeString()}`);
      } catch (e) {
        setStatus(false, "errore: " + e.message);
      }
    }

    function render(records) {
      // Raggruppa per (start -> target)
      const byRound = {};
      for (const r of records) {
        const k = `${r.start} → ${r.target}`;
        (byRound[k] = byRound[k] || []).push(r);
      }
      // Ordina ogni gruppo per mosse (asc), poi per timestamp (asc)
      for (const k of Object.keys(byRound)) {
        byRound[k].sort((a, b) => a.mosse - b.mosse || a.timestamp - b.timestamp);
      }

      // Signature per evitare re-render se nulla e' cambiato
      const sig = JSON.stringify(records.map(r => [r.timestamp, r.squadra, r.mosse]));
      if (sig === lastSig) return;
      lastSig = sig;

      const container = document.getElementById("rounds");
      container.innerHTML = "";

      if (Object.keys(byRound).length === 0) {
        container.innerHTML = '<div class="round-card"><div class="empty">Nessuna partita vinta ancora. Quando una squadra arriva al target, comparirà qui.</div></div>';
        return;
      }

      // Ordine fisso dei round (se presenti): cat→eagle, pizza→emperor, winter→happiness, poi altri
      const ROUND_ORDER = ["cat → eagle", "pizza → emperor", "winter → happiness"];
      const keys = Object.keys(byRound).sort((a, b) => {
        const ia = ROUND_ORDER.indexOf(a), ib = ROUND_ORDER.indexOf(b);
        if (ia !== -1 && ib !== -1) return ia - ib;
        if (ia !== -1) return -1;
        if (ib !== -1) return 1;
        return a.localeCompare(b);
      });

      for (const k of keys) {
        const recs = byRound[k];
        const [start, target] = k.split(" → ");
        const card = document.createElement("div");
        card.className = "round-card flash";

        let rows = "";
        recs.forEach((r, i) => {
          const medal = i === 0 ? "🥇" : i === 1 ? "🥈" : i === 2 ? "🥉" : (i + 1) + ".";
          const cls = i < 3 ? `rank rank-${i + 1}` : "rank";
          rows += `<tr><td class="${cls}">${medal}</td><td>${escapeHtml(r.squadra)}</td><td>${r.mosse} mosse</td></tr>`;
        });

        card.innerHTML = `
      <h2 class="round-title">
        <div>
          <span class="label">${escapeHtml(start)}</span>
          <span class="arrow">→</span>
          <span class="target">${escapeHtml(target)}</span>
        </div>
        <span class="count">${recs.length} squadr${recs.length === 1 ? "a" : "e"}</span>
      </h2>
      <table>${rows}</table>
    `;
        container.appendChild(card);
      }
    }

    function escapeHtml(s) {
      return String(s).replace(/[&<>"']/g, c => ({
        "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"
      }[c]));
    }

    // init
    if (appUrl) {
      document.getElementById("setup").style.display = "none";
      document.getElementById("urlInput").value = appUrl;
      poll();
    } else {
      setStatus(false, "in attesa di URL");
    }
    setInterval(poll, POLL_MS);
  </script>

</body>

</html>
